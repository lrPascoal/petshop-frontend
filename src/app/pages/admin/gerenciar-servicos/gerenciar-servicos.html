<div class="tabela-container">
  
  <div class="cabecalho-pagina">
    <h2>Catálogo de Serviços ✂️</h2>
    <button mat-raised-button color="primary">
      <mat-icon>add</mat-icon> Novo Serviço
    </button>
  </div>

  <table mat-table [dataSource]="listaServicos" class="mat-elevation-z4">

    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef> Serviço </th>
      <td mat-cell *matCellDef="let servico"> <strong>{{ servico.nome }}</strong> </td>
    </ng-container>

    <ng-container matColumnDef="descricao">
      <th mat-header-cell *matHeaderCellDef> Descrição </th>
      <td mat-cell *matCellDef="let servico"> {{ servico.descricao }} </td>
    </ng-container>

    <ng-container matColumnDef="preco">
      <th mat-header-cell *matHeaderCellDef> Preço </th>
      <td mat-cell *matCellDef="let servico"> {{ servico.preco | currency:'BRL':'symbol':'1.2-2' }} </td>
    </ng-container>

    <ng-container matColumnDef="duracao">
      <th mat-header-cell *matHeaderCellDef> Duração Estimada </th>
      <td mat-cell *matCellDef="let servico"> {{ servico.duracao }} </td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef> Ações </th>
      <td mat-cell *matCellDef="let servico">
        <button mat-icon-button color="primary" title="Editar Preço/Serviço">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" title="Excluir Serviço">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="colunasExibidas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunasExibidas;"></tr>
  </table>
</div>
