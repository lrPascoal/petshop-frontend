<div class="container-servicos">
  <h2>Gerenciar Serviços e Preços 🏷️</h2>

  <mat-card class="form-card">
    <mat-card-content>
      <form [formGroup]="servicoForm" (ngSubmit)="salvar()" class="servico-form">
        
        <mat-form-field appearance="outline">
          <mat-label>Nome do Serviço</mat-label>
          <input matInput formControlName="nome" placeholder="Ex: Hidratação">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Preço (R$)</mat-label>
          <input matInput type="number" formControlName="preco" placeholder="0.00">
          <span matPrefix>R$</span> 
        </mat-form-field>

        <button mat-raised-button color="primary" [disabled]="servicoForm.invalid">
          <mat-icon>add</mat-icon> Adicionar
        </button>
      </form>
    </mat-card-content>
  </mat-card>

  <table mat-table [dataSource]="listaDeServicos" class="mat-elevation-z4">
    
    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef> Serviço </th>
      <td mat-cell *matCellDef="let s"> {{ s.nome }} </td>
    </ng-container>

    <ng-container matColumnDef="preco">
      <th mat-header-cell *matHeaderCellDef> Valor </th>
      <td mat-cell *matCellDef="let s"> {{ s.preco | currency:'BRL' }} </td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef> Ações </th>
      <td mat-cell *matCellDef="let s">
        <button mat-icon-button color="warn" (click)='excluir(s.id)'>
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="colunas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
  </table>
</div>
