<div class="tabela-container">
  <h2>Meus Pets 🐾</h2>

  <div style="margin-bottom: 20px;">
    <button mat-raised-button color="accent" routerLink="/tutor/novo-pet">
      <mat-icon>add</mat-icon> Cadastrar Novo Pet
    </button>
  </div>

  <table mat-table [dataSource]="listaDePets" class="mat-elevation-z4">

    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef> Nome do Pet </th>
      <td mat-cell *matCellDef="let pet"> {{ pet.nome }} </td>
    </ng-container>

    <ng-container matColumnDef="especie">
      <th mat-header-cell *matHeaderCellDef> Espécie </th>
      <td mat-cell *matCellDef="let pet"> {{ pet.especie }} </td>
    </ng-container>

    <ng-container matColumnDef="raca">
      <th mat-header-cell *matHeaderCellDef> Raça </th>
      <td mat-cell *matCellDef="let pet"> {{ pet.raca }} </td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef> Ações </th>
      <td mat-cell *matCellDef="let pet">
        <button mat-icon-button color="primary" title="Editar Pet" [routerLink]="['/tutor/editar-pet', pet.id]">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" title="Remover Pet" (click)="excluirPet(pet.id, pet.nome)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="colunasExibidas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunasExibidas;"></tr>
  </table>
</div>
